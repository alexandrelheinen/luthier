name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and dev tools
        run: pip install -e ".[dev,reconstruction]"

      - name: Check formatting with Black
        run: black --check src tests

      - name: Lint with Ruff
        run: ruff check src tests

      - name: Type-check with mypy
        run: mypy

      - name: CLI smoke test (AC-CLI-01)
        run: |
          luthier --help
          luthier --version
          python -m luthier --help

      - name: Run unit tests with coverage gate (≥ 80%)
        run: pytest --cov=luthier --cov-report=term-missing

  governance:
    name: governance (method enforcement)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and dev tools
        run: pip install -e ".[dev,reconstruction]"

      - name: Enforce method invariants (traceability, stack/code, constitution)
        run: python scripts/check_governance.py

      - name: Lint commit subjects (Conventional, unitary) — PR only
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          fail=0
          pattern='^(feat|fix|docs|test|refactor|perf|build|ci|chore|style|revert)(\([a-z0-9._/-]+\))?!?: .+'
          while IFS= read -r subject; do
            [ -z "${subject}" ] && continue
            case "${subject}" in
              "Merge "*) continue ;;
            esac
            if ! printf '%s' "${subject}" | grep -Eq "${pattern}"; then
              echo "::error::Non-conventional commit subject: ${subject}"
              fail=1
            fi
            if [ "${#subject}" -gt 72 ]; then
              echo "::error::Commit subject exceeds 72 chars: ${subject}"
              fail=1
            fi
          done < <(git log --format=%s "${BASE_SHA}..${HEAD_SHA}")
          exit "${fail}"

      - name: Check branch name — PR only
        if: github.event_name == 'pull_request'
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          # Conventional <type>/<slug>; 'cursor/' is reserved for automated agents.
          if ! printf '%s' "${BRANCH}" | grep -Eq '^(feat|fix|docs|test|refactor|perf|build|ci|chore|style|revert|cursor)/'; then
            echo "::error::Branch '${BRANCH}' must be <type>/<slug> (see CONTRIBUTING.md)."
            exit 1
          fi

      - name: Check PR has Summary and Test plan — PR only
        if: github.event_name == 'pull_request'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          body_lower="$(printf '%s' "${PR_BODY:-}" | tr '[:upper:]' '[:lower:]')"
          missing=0
          printf '%s' "${body_lower}" | grep -q 'summary' || { echo "::error::PR description must include a Summary section."; missing=1; }
          printf '%s' "${body_lower}" | grep -q 'test plan' || { echo "::error::PR description must include a Test plan section."; missing=1; }
          exit "${missing}"

  acceptance:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and dev tools
        run: pip install -e ".[dev,reconstruction]"

      - name: Fetch COLMAP golden images
        run: ./scripts/fetch_golden_colmap.sh --count 20

      - name: Run acceptance tests
        run: pytest -m acceptance
