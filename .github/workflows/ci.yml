name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and dev tools
        run: pip install -e ".[dev]"

      - name: Verify documentation artifacts exist
        run: |
          test -f docs/specification.md
          test -f docs/architecture.md
          test -f docs/testing.md
          test -f README.md

      - name: Check formatting with Black
        run: black --check src tests

      - name: Lint with Ruff
        run: ruff check src tests

      - name: Type-check with mypy
        run: mypy

      - name: CLI smoke test (AC-CLI-01)
        run: |
          luthier --help
          luthier --version
          python -m luthier --help

      - name: Run tests with coverage
        run: pytest --cov=luthier --cov-report=term-missing

  acceptance:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and dev tools
        run: pip install -e ".[dev]"

      - name: Run acceptance tests when golden data is present
        run: |
          if [ -d tests/data/golden/images ] && [ "$(ls -A tests/data/golden/images 2>/dev/null)" ]; then
            pytest -m acceptance --cov=luthier --cov-report=term-missing
          else
            echo "Golden images not present; skipping acceptance job."
          fi
